<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>経県値マップ 2026（デモ）</title>
  <meta name="description" content="行ったまちを5段階で塗り分ける経県値マップ。背景地図切替・鉄道/高速の重畳・CSV/HTML/JPG書き出し。" />

  <!-- 共有カード(OGP / Twitter) -->
  <!-- ↓ 公開URLに合わせて USERNAME / REPO を書き換える(絶対URL推奨) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="経県値マップ 2026" />
  <meta property="og:title" content="経県値マップ 2026（デモ）" />
  <meta property="og:description" content="行ったまちを5段階で塗り分け。背景地図切替・鉄道/高速の重畳・CSV/HTML/JPG書き出し。" />
  <meta property="og:image" content="https://USERNAME.github.io/REPO/og.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:url" content="https://USERNAME.github.io/REPO/" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="経県値マップ 2026（デモ）" />
  <meta name="twitter:description" content="行ったまちを5段階で塗り分け。CSV/HTML/JPGで書き出しできます。" />
  <meta name="twitter:image" content="https://USERNAME.github.io/REPO/og.png" />

  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet"
        integrity="sha384-MinO0mNliZ3vwppuPOUnGa+iq619pfMhLVUXfC4LHwSCvF9H+6P/KO4Q7qBOYV5V" crossorigin="anonymous" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"
          integrity="sha384-SYKAG6cglRMN0RVvhNeBY0r3FYKNOJtznwA0v7B5Vp9tr31xAHsZC0DqkQ/pZDmj" crossorigin="anonymous"></script>
  <link href="style.css?v=20260604e" rel="stylesheet" />
  <style>
    #notice {
      position: absolute; top: 52px; left: 0; right: 0; z-index: 3;
      background: #fff7ed; border-bottom: 1px solid #fed7aa; color: #9a3412;
      font-size: 12px; line-height: 1.5; padding: 8px 40px 8px 14px;
    }
    #notice b { color: #7c2d12; }
    #notice .x { position: absolute; top: 6px; right: 10px; cursor: pointer;
      border: none; background: none; font-size: 16px; color: #9a3412; }
    #notice.hidden { display: none; }
  </style>
</head>
<body>
  <div id="map"></div>

  <header id="topbar">
    <a class="brand" href="./">経県値<span class="dot">マップ</span> <span style="font-size:11px;color:#6b7280;font-weight:600">DEMO</span></a>
    <div class="right">
      <button id="panel-toggle" aria-label="設定">⚙ 設定</button>
    </div>
  </header>

  <div id="notice">
    <b>デモ版</b>：塗りは<b>この端末のブラウザにのみ</b>保存されます（サーバ保存・ログインはありません）。
    端末やブラウザを変えると消えます。残すには <b>CSV / HTML / JPG</b> で書き出してください。
    <button class="x" id="notice-x" aria-label="閉じる">×</button>
  </div>

  <aside id="panel">
    <div class="grab"></div>

    <div class="field">
      <h2>スコア</h2>
      <div class="score"><span id="score">0</span> 点</div>
    </div>

    <div class="divider"></div>

    <div class="field">
      <label for="bg">背景地図</label>
      <select id="bg">
        <optgroup label="地理院">
          <option value="pale">淡色</option>
          <option value="std">標準</option>
          <option value="photo">写真</option>
          <option value="blank">白地図(z5-8)</option>
        </optgroup>
        <optgroup label="その他">
          <option value="osm">OpenStreetMap</option>
          <option value="carto_light">CARTO Light</option>
          <option value="carto_dark">CARTO Dark</option>
          <option value="esri_photo">Esri 衛星写真</option>
          <option value="otopo">OpenTopoMap</option>
        </optgroup>
        <option value="none">なし(白)</option>
      </select>
    </div>

    <div class="field">
      <label for="boundary">境界の精細さ</label>
      <select id="boundary">
        <option value="std">標準（軽い）</option>
        <option value="detail">高精細（重い）</option>
      </select>
    </div>

    <div class="field">
      <label>背景の不透明度</label>
      <div class="opacity-row">
        <input id="bgopacity" type="range" min="0" max="100" value="100" />
        <span id="bgopval">100%</span>
      </div>
    </div>

    <div class="field">
      <label>塗りの不透明度</label>
      <div class="opacity-row">
        <input id="fillopacity" type="range" min="0" max="100" value="65" />
        <span id="fillopval">65%</span>
      </div>
    </div>

    <div class="field">
      <label>境界線の不透明度</label>
      <div class="opacity-row">
        <input id="lineopacity" type="range" min="0" max="100" value="100" />
        <span id="lineopval">100%</span>
      </div>
    </div>

    <div class="field">
      <label>重ねる</label>
      <div class="toggles">
        <label><input type="checkbox" id="ov-rail" /> 鉄道（路線名）</label>
        <label><input type="checkbox" id="ov-hw" /> 高速道路（道路名）</label>
        <label><input type="checkbox" id="ov-label" /> 自治体名</label>
      </div>
    </div>

    <div class="divider"></div>

    <div class="field">
      <h2>凡例</h2>
      <div class="legend">
        <span data-lv="5">◎ 居住 (5)</span>
        <span data-lv="4">○ 宿泊 (4)</span>
        <span data-lv="3">● 訪問 (3)</span>
        <span data-lv="2">△ 接地 (2)</span>
        <span data-lv="1">▲ 通過 (1)</span>
        <span data-lv="0">× 未踏 (0)</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="field">
      <label>ダウンロード（保管はこちら）</label>
      <div class="dl-row">
        <button id="dl-csv" class="btn ghost sm">CSV</button>
        <button id="dl-html" class="btn ghost sm">HTML</button>
        <button id="dl-jpg" class="btn ghost sm">JPG</button>
      </div>
    </div>

    <div class="field">
      <label>インポート</label>
      <div class="dl-row">
        <button id="imp-csv" class="btn ghost sm">CSV を読み込む</button>
      </div>
      <input id="imp-file" type="file" accept=".csv,text/csv" hidden />
    </div>

    <div class="field">
      <span id="status" class="status-auto">この端末に自動保存</span>
    </div>
    <div class="hint">区画をクリックで 0→1→2→3→4→5→0 と循環します。</div>
  </aside>

  <script>
    // 揮発注意バナーの開閉(閉じたら記憶)
    (function () {
      var n = document.getElementById("notice");
      if (localStorage.getItem("notice_dismissed") === "1") n.classList.add("hidden");
      document.getElementById("notice-x").onclick = function () {
        n.classList.add("hidden");
        localStorage.setItem("notice_dismissed", "1");
      };
    })();
  </script>
  <script src="app.js?v=20260604e"></script>
</body>
</html>
